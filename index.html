<style>
  :root{

    --ink:#222222;

    --line:#E2E1DC;

  *{box-sizing:border-box;margin:0;padding:0}

  .bar{display:flex;align-items:center;gap:20px;height:64px}
  .brand{font-weight:800;letter-spacing:.2px;color:var(--navy);font-size:18px;white-space:nowrap}
  .nav{display:flex;gap:22px;margin-left:14px;flex:1}
  .nav a{font-size:14.5px;color:var(--muted);font-weight:500;transition:color .15s}
  .nav a:hover{color:var(--navy)}
  .head-actions{display:flex;align-items:center;gap:14px;margin-left:auto}
  .lang{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--white)}
  .lang button{appearance:none;border:0;background:transparent;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--muted);padding:6px 12px;transition:.15s}
  .lang button[aria-pressed="true"]{background:var(--navy);color:#fff}

  .btn{display:inline-flex;align-items:center;gap:8px;font:inherit;font-weight:600;font-size:14.5px;border:1px solid transparent;border-radius:999px;padding:11px 20px;cursor:pointer;transition:transform .12s ease, background .15s, color .15s, border-color .15s;white-space:nowrap}
  .btn:active{transform:translateY(1px)}
  .btn-amber{background:var(--amber);color:#3a2700}
  .btn-amber:hover{background:var(--amber-deep);color:#fff}
  .btn-navy{background:var(--navy);color:#fff}
  .btn-navy:hover{background:var(--navy-soft)}
  .btn-ghost{background:transparent;border-color:var(--navy);color:var(--navy)}
  .btn-ghost:hover{background:var(--navy);color:#fff}
  .head-actions .btn{padding:9px 16px}

  /* ---------- hero ---------- */
  .hero{padding:72px 0 64px}
  .hero-grid{display:grid;grid-template-columns:1.25fr .9fr;gap:56px;align-items:center}
  .eyebrow{display:inline-block;font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-deep);margin-bottom:18px}
  .hero h1{font-size:clamp(34px,5vw,56px);line-height:1.05;font-weight:800;color:var(--navy);letter-spacing:-.5px}
  .hero .position{margin-top:18px;font-size:clamp(17px,2vw,21px);color:var(--ink);font-weight:500;max-width:30ch}
  .hero .position b{color:var(--navy);font-weight:600}
  .hero-cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px}
  .portrait{position:relative}
  .portrait img{width:100%;border-radius:14px;box-shadow:0 24px 60px -28px rgba(31,56,100,.55);position:relative;z-index:2}
  .portrait::after{content:"";position:absolute;inset:auto -16px -16px auto;width:62%;height:62%;background:var(--amber);border-radius:14px;z-index:1}

  /* ---------- sections ---------- */
  section{padding:56px 0;border-top:1px solid var(--line)}
  .sec-head{display:flex;align-items:baseline;gap:16px;margin-bottom:30px}
  .sec-head h2{font-size:clamp(24px,3.2vw,32px);font-weight:800;color:var(--navy);letter-spacing:-.3px}
  .sec-head .rule{flex:1;height:1px;background:var(--line)}
  .lead{font-size:clamp(18px,2.1vw,21px);line-height:1.7;max-width:62ch;color:var(--ink)}

  /* competencies */
  .comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .comp{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;font-weight:600;font-size:15.5px;color:var(--navy);display:flex;align-items:center;gap:12px}
  .comp::before{content:"";flex:none;width:8px;height:8px;border-radius:2px;background:var(--amber);transform:rotate(45deg)}

  /* projects */
  .proj-list{display:grid;gap:16px}
  .proj{background:var(--white);border:1px solid var(--line);border-left:4px solid var(--amber);border-radius:var(--r);padding:20px 22px}
  .proj b{color:var(--navy)}
  .proj p{margin:0;color:var(--ink)}

  /* experience timeline (signature) */
  .timeline{position:relative;padding-left:34px}
  .timeline::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:linear-gradient(var(--navy),var(--line))}
  .tl-item{position:relative;padding:0 0 30px 8px}
  .tl-item:last-child{padding-bottom:0}
  .tl-item::before{content:"";position:absolute;left:-33px;top:5px;width:18px;height:18px;border-radius:50%;background:var(--white);border:3px solid var(--amber);box-shadow:0 0 0 3px var(--bg)}
  .tl-period{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--amber-deep);text-transform:uppercase}
  .tl-role{font-size:19px;font-weight:700;color:var(--navy);margin-top:3px}
  .tl-org{font-size:15px;color:var(--muted);font-weight:500;margin-top:1px}
  .tl-org a{border-bottom:1px solid transparent;transition:.15s}
  .tl-org a:hover{color:var(--navy);border-color:var(--amber)}
  .tl-desc{margin-top:9px;color:var(--ink);font-size:15.5px}

  /* education */
  .edu-list{display:grid;gap:14px}
  .edu{display:grid;grid-template-columns:120px 1fr;gap:18px;background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:16px 20px}
  .edu .yr{font-weight:700;color:var(--amber-deep);font-size:15px}
  .edu .body b{color:var(--navy)}

  /* languages */
  .lang-list{display:flex;flex-wrap:wrap;gap:10px}
  .lang-chip{background:var(--white);border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-weight:600;font-size:15px;color:var(--navy)}
  .lang-chip span{color:var(--muted);font-weight:500}

  /* contact / footer */
  .contact-grid{display:grid;grid-template-columns:1fr .8fr;gap:48px;align-items:center}
  .contact h2{color:#fff}
  #contact{background:var(--navy);color:#fff;border-top:0;margin-top:8px}
  #contact .sec-head .rule{background:rgba(255,255,255,.22)}
  #contact .lead{color:rgba(255,255,255,.9)}
  .contact-list{margin-top:22px;display:grid;gap:12px}
  .contact-list a,.contact-list span{display:inline-flex;align-items:center;gap:12px;font-size:17px;color:#fff;font-weight:500}
  .contact-list a:hover{color:var(--amber)}
  .contact-list .ic{flex:none;width:22px;text-align:center;color:var(--amber);font-weight:700}
  .contact-cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:26px}
  .contact .portrait img{box-shadow:0 24px 60px -28px rgba(0,0,0,.6)}
  .contact .portrait::after{background:var(--amber)}
  .foot{padding:22px 0;text-align:center;color:var(--muted);font-size:13.5px}

  .reveal{opacity:0;transform:translateY(14px);transition:opacity .6s ease, transform .6s ease}
  .reveal.in{opacity:1;transform:none}

  @media (max-width:880px){
    .nav{display:none}
    .hero-grid{grid-template-columns:1fr;gap:34px}
    .portrait{order:-1;max-width:360px;margin:0 auto}
    .comp-grid{grid-template-columns:repeat(2,1fr)}
    .contact-grid{grid-template-columns:1fr;gap:32px}
    .contact .portrait{max-width:300px}
  }
  @media (max-width:560px){
    body{font-size:16px}
    .head-actions .btn-book-head{display:none}
    .comp-grid{grid-template-columns:1fr}
    .edu{grid-template-columns:1fr;gap:4px}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    .reveal{opacity:1;transform:none;transition:none}
  }
</style>
</head>

let LANG = "en";
try { const s = localStorage.getItem("lang"); if (s==="en"||s==="uk") LANG = s; } catch(e){}
try { const u = new URLSearchParams(location.search).get("lang"); if (u==="en"||u==="uk") LANG = u; } catch(e){}

const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function render(lang){
  const d = DATA[lang];
  LANG = lang;
  document.documentElement.lang = d.htmlLang;
  document.title = d.metaTitle;
  const md = document.querySelector('meta[name="description"]'); if(md) md.setAttribute("content", d.metaDesc);

  // simple keyed text (allow inline <b> for position)
  document.querySelectorAll("[data-k]").forEach(el=>{
    const k = el.getAttribute("data-k");
    if(d[k]==null) return;
    if(k==="position") el.innerHTML = d[k];
    else el.textContent = d[k];
  });

  // action buttons
  document.querySelectorAll('[data-act]').forEach(el=>{
    const a = el.getAttribute("data-act");
    if(a==="book"){ el.href = LINKS.book; el.textContent = d.bookCall; }
    if(a==="linkedin"){ el.href = LINKS.linkedin; if(!el.querySelector("[data-k]")) el.textContent = d.linkedinBtn; }
    if(a==="cv"){ el.href = d.cvFile; el.setAttribute("download",""); el.textContent = d.downloadCV; }
  });

  // images alt
  $("#heroImg").alt = d.altHero;
  $("#contactImg").alt = d.altContact;

  // nav
  $("#nav").innerHTML = Object.entries(d.nav).map(([id,label])=>`<a href="#${id}">${esc(label)}</a>`).join("");

  // competencies
  $("#compGrid").innerHTML = d.competencies.map(c=>`<div class="comp">${esc(c)}</div>`).join("");

  // projects
  $("#projList").innerHTML = d.projects.map(p=>`<div class="proj"><p><b>${esc(p[0])}</b> — ${esc(p[1])}</p></div>`).join("");

  // experience timeline
  $("#timeline").innerHTML = d.experience.map(e=>{
    const org = e[3] ? `${esc(e[2])} · <a href="https://${e[3]}" target="_blank" rel="noopener">${esc(e[3])}</a>` : esc(e[2]);
    return `<div class="tl-item"><div class="tl-period">${esc(e[0])}</div><div class="tl-role">${esc(e[1])}</div><div class="tl-org">${org}</div><div class="tl-desc">${esc(e[4])}</div></div>`;
  }).join("");

  // education
  $("#eduList").innerHTML = d.education.map(e=>{
    const sub = e[2] ? ` — ${esc(e[2])}` : "";
    return `<div class="edu"><div class="yr">${esc(e[0])}</div><div class="body"><b>${esc(e[1])}</b>${sub}</div></div>`;
  }).join("");

  // languages
  $("#langList").innerHTML = d.languages.map(l=>`<div class="lang-chip">${esc(l[0])} <span>— ${esc(l[1])}</span></div>`).join("");

  // footer
  $("#foot").textContent = d.foot;

  // lang buttons state
  document.querySelectorAll(".lang button").forEach(b=>b.setAttribute("aria-pressed", String(b.dataset.lang===lang)));
}

document.querySelectorAll(".lang button").forEach(b=>{
  b.addEventListener("click",()=>{
    const l = b.dataset.lang;
    render(l);
    try{ localStorage.setItem("lang", l); }catch(e){}
  });
});

render(LANG);

// subtle reveal on scroll
const io = new IntersectionObserver((ents)=>{
  ents.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
},{threshold:.12});
document.querySelectorAll(".reveal").forEach(s=>io.observe(s));
</script>
